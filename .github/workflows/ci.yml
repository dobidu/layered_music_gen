name: CI

on:
  push:
    branches: ["main", "productize-v0.1-pr"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev deps
        run: pip install -e '.[dev]'

      - name: Run fast test suite (includes determinism regression)
        run: pytest -m "not slow" --cov=src/musicgen --cov-report=term-missing -q

      - name: Enforce coverage threshold
        run: pytest -m "not slow" --cov=src/musicgen --cov-fail-under=80 -q --no-header
